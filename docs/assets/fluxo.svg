<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="250" viewBox="0 0 1200 250" fill="none" role="img" aria-label="Como funciona o Pauta: reportar, classificar, mapa e feed, recomendar, notificar">
  <defs>
    <style>
      .flow { stroke-dasharray: 7 7; animation: march 1s linear infinite; }
      @keyframes march { to { stroke-dashoffset: -28 } }
      .card { transition: none }
    </style>
    <filter id="g2"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/><feColorMatrix type="saturate" values="0"/></filter>
  </defs>

  <rect x="1" y="1" width="1198" height="248" rx="20" fill="#0a0e1a" stroke="#1b2540"/>

  <!-- connectors -->
  <g stroke="#2d9cff" stroke-width="2" fill="none" opacity="0.8">
    <path class="flow" d="M240 121 H268"/><path d="M266 121 l-9 -5 v10 z" fill="#2d9cff" stroke="none"/>
    <path class="flow" d="M470 121 H498"/><path d="M496 121 l-9 -5 v10 z" fill="#2d9cff" stroke="none"/>
    <path class="flow" d="M700 121 H728"/><path d="M726 121 l-9 -5 v10 z" fill="#2d9cff" stroke="none"/>
    <path class="flow" d="M930 121 H958"/><path d="M956 121 l-9 -5 v10 z" fill="#2d9cff" stroke="none"/>
  </g>

  <!-- ===== STEP 1: Reportar ===== -->
  <g transform="translate(40,46)">
    <rect width="200" height="150" rx="16" fill="#0e1424" stroke="#20294a"/>
    <text x="18" y="30" font-family="ui-monospace,Menlo,monospace" font-size="13" fill="#4b5675">01</text>
    <circle cx="100" cy="60" r="24" fill="#ff6b3522" stroke="#ff6b35" stroke-width="1.5"/>
    <!-- pin -->
    <path d="M100 48 a9 9 0 1 1 -0.1 0 Z M100 57 v0 M100 69 c0 0 -9 -6 -9 -13 a9 9 0 0 1 18 0 c0 7 -9 13 -9 13 Z" fill="none" stroke="#ff6b35" stroke-width="2" stroke-linejoin="round"/>
    <circle cx="100" cy="56" r="3" fill="#ff6b35"/>
    <text x="100" y="108" text-anchor="middle" font-family="'Bricolage Grotesque','Trebuchet MS',sans-serif" font-size="17" font-weight="700" fill="#f4f4f0">Reportar</text>
    <text x="100" y="130" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12.5" fill="#94a3b8">foto + localização</text>
  </g>

  <!-- ===== STEP 2: Classificar ===== -->
  <g transform="translate(270,46)">
    <rect width="200" height="150" rx="16" fill="#0e1424" stroke="#20294a"/>
    <text x="18" y="30" font-family="ui-monospace,Menlo,monospace" font-size="13" fill="#4b5675">02</text>
    <circle cx="100" cy="60" r="24" fill="#2d9cff22" stroke="#2d9cff" stroke-width="1.5"/>
    <!-- sparkle -->
    <path d="M100 48 L103 57 L112 60 L103 63 L100 72 L97 63 L88 60 L97 57 Z" fill="#2d9cff"/>
    <path d="M114 50 l1.5 4 l4 1.5 l-4 1.5 l-1.5 4 l-1.5 -4 l-4 -1.5 l4 -1.5 Z" fill="#60a5fa"/>
    <text x="100" y="108" text-anchor="middle" font-family="'Bricolage Grotesque','Trebuchet MS',sans-serif" font-size="17" font-weight="700" fill="#f4f4f0">Classificar</text>
    <text x="100" y="130" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12.5" fill="#94a3b8">LLM de visão</text>
  </g>

  <!-- ===== STEP 3: Mapa & Feed ===== -->
  <g transform="translate(500,46)">
    <rect width="200" height="150" rx="16" fill="#0e1424" stroke="#20294a"/>
    <text x="18" y="30" font-family="ui-monospace,Menlo,monospace" font-size="13" fill="#4b5675">03</text>
    <circle cx="100" cy="60" r="24" fill="#60a5fa22" stroke="#60a5fa" stroke-width="1.5"/>
    <!-- map -->
    <path d="M89 51 L97 48 L107 51 L115 48 V69 L107 72 L97 69 L89 72 Z" fill="none" stroke="#60a5fa" stroke-width="1.8" stroke-linejoin="round"/>
    <path d="M97 48 V69 M107 51 V72" stroke="#60a5fa" stroke-width="1.4"/>
    <text x="100" y="108" text-anchor="middle" font-family="'Bricolage Grotesque','Trebuchet MS',sans-serif" font-size="17" font-weight="700" fill="#f4f4f0">Mapa &amp; Feed</text>
    <text x="100" y="130" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12.5" fill="#94a3b8">geo + comunidade</text>
  </g>

  <!-- ===== STEP 4: Recomendar ===== -->
  <g transform="translate(730,46)">
    <rect width="200" height="150" rx="16" fill="#0e1424" stroke="#20294a"/>
    <text x="18" y="30" font-family="ui-monospace,Menlo,monospace" font-size="13" fill="#4b5675">04</text>
    <circle cx="100" cy="60" r="24" fill="#ffd23f22" stroke="#ffd23f" stroke-width="1.5"/>
    <!-- target -->
    <circle cx="100" cy="60" r="12" fill="none" stroke="#ffd23f" stroke-width="1.8"/>
    <circle cx="100" cy="60" r="6" fill="none" stroke="#ffd23f" stroke-width="1.8"/>
    <circle cx="100" cy="60" r="2" fill="#ffd23f"/>
    <text x="100" y="108" text-anchor="middle" font-family="'Bricolage Grotesque','Trebuchet MS',sans-serif" font-size="17" font-weight="700" fill="#f4f4f0">Recomendar</text>
    <text x="100" y="130" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12.5" fill="#94a3b8">afinidade · pgvector</text>
  </g>

  <!-- ===== STEP 5: Notificar ===== -->
  <g transform="translate(960,46)">
    <rect width="200" height="150" rx="16" fill="#0e1424" stroke="#20294a"/>
    <text x="18" y="30" font-family="ui-monospace,Menlo,monospace" font-size="13" fill="#4b5675">05</text>
    <circle cx="100" cy="60" r="24" fill="#34d39922" stroke="#34d399" stroke-width="1.5"/>
    <!-- bell -->
    <path d="M100 47 c-7 0 -11 5 -11 12 c0 6 -3 8 -4 10 h30 c-1 -2 -4 -4 -4 -10 c0 -7 -4 -12 -11 -12 Z" fill="none" stroke="#34d399" stroke-width="1.8" stroke-linejoin="round"/>
    <path d="M96 71 a4 4 0 0 0 8 0" fill="none" stroke="#34d399" stroke-width="1.8"/>
    <text x="100" y="108" text-anchor="middle" font-family="'Bricolage Grotesque','Trebuchet MS',sans-serif" font-size="17" font-weight="700" fill="#f4f4f0">Notificar</text>
    <text x="100" y="130" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12.5" fill="#94a3b8">outbox → push / e-mail</text>
  </g>

  <rect x="1" y="1" width="1198" height="248" rx="20" filter="url(#g2)" opacity="0.04"/>
</svg>
